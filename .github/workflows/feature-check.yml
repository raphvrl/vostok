name: Feature Quality Check

on:
  pull_request:
    branches: [dev] # Features → dev
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".clang-format"
      - ".clang-tidy"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check clang-format
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: "17"
          check-path: "."
          include-regex: '^(src|include|tests)/.*\.(cpp|hpp)$'
          exclude-regex: "^third_party/.*"

  basic-build-test:
    name: 🧪 Basic Build & Test
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup C++
        uses: aminya/setup-cpp@v1
        with:
          compiler: clang
          vcvarsall: false
          cmake: true
          ninja: true

      - name: Install Vulkan SDK 1.4
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.313.0
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libwayland-dev \
            wayland-protocols \
            wayland-scanner++ \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/third_party
          key: ${{ runner.os }}-feature-deps-${{ hashFiles('**/CMakeLists.txt', 'third_party/**') }}
          restore-keys: |
            ${{ runner.os }}-feature-deps-
            ${{ runner.os }}-deps-

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DVOSTOK_BUILD_TESTS=ON \
            -DVOSTOK_ENABLE_VALIDATION=OFF \
            -DVOSTOK_TREAT_WARNINGS_AS_ERRORS=ON \
            -G Ninja
        env:
          CC: clang
          CXX: clang++

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --parallel

  basic-static-check:
    name: 🔍 Basic Static Check
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup C++
        uses: aminya/setup-cpp@v1
        with:
          compiler: clang
          vcvarsall: false
          cmake: true
          ninja: true
          clang-tidy: true

      - name: Install Vulkan SDK 1.4
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.313.0
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libwayland-dev \
            wayland-protocols \
            wayland-scanner++ \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/third_party
          key: ${{ runner.os }}-feature-static-deps-${{ hashFiles('**/CMakeLists.txt', 'third_party/**') }}
          restore-keys: |
            ${{ runner.os }}-feature-static-deps-
            ${{ runner.os }}-deps-

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVOSTOK_ENABLE_CLANG_TIDY=ON \
            -DVOSTOK_BUILD_TESTS=OFF \
            -DVOSTOK_TREAT_WARNINGS_AS_ERRORS=ON \
            -G Ninja

      - name: Run basic clang-tidy check
        run: |
          echo "Running lightweight clang-tidy check for features..."
          cd build

          echo "Clang-tidy configuration:"
          echo "- Basic checks only (no deep analysis)"
          echo "- Third-party excluded via CMake properties"
          echo "- Focus on critical issues only"

          ninja vostok -v || {
            echo "⚠️  Some clang-tidy issues found"
            echo "This is a basic check - full analysis will run on dev→main PR"
            exit 1
          }

          echo "✅ Basic clang-tidy check completed"

  feature-quality-gate:
    name: ✅ Feature Quality Gate
    runs-on: ubuntu-latest
    needs: [format-check, basic-build-test, basic-static-check]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.format-check.result }}" != "success" ]]; then
            echo "❌ Format check failed"
            exit 1
          fi

          if [[ "${{ needs.basic-build-test.result }}" != "success" ]]; then
            echo "❌ Build and test failed"
            exit 1
          fi

          if [[ "${{ needs.basic-static-check.result }}" != "success" ]]; then
            echo "❌ Basic static check failed"
            exit 1
          fi

          echo "✅ All feature quality checks passed!"
          echo "🚀 Ready to merge into dev branch"

      - name: Add PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;

            const comment = `## 🎯 Feature Quality Check Results

            ✅ **Feature ready for dev branch!**

            - 🎨 Code formatting: ✅
            - 🔍 Basic static analysis: ✅  
            - 🧪 Build & unit tests: ✅

            Your feature has passed all basic quality checks and is ready to be merged into \`dev\`. 

            📝 **Note:** Full quality gate (coverage, security scan, multi-platform) will run when \`dev\` is merged to \`main\`.`;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr_number,
              body: comment
            });
