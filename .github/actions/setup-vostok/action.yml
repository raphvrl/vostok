name: 'Setup Vostok Build Environment'
description: 'Setup complete environment for Vostok builds'
inputs:
  vulkan-version:
    description: 'Vulkan SDK version'
    default: '1.4.313.0'
  build-type:
    description: 'CMake build type'
    default: 'Debug'
  enable-examples:
    description: 'Build examples'
    default: 'false'
  enable-clang-tidy:
    description: 'Enable clang-tidy'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup C++
      uses: aminya/setup-cpp@v1
      with:
        compiler: clang
        cmake: true
        ninja: true
        
    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: ${{ inputs.vulkan-version }}
        cache: true
        
    - name: Install System Dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxrandr-dev libxinerama-dev libxcursor-dev \
          libxi-dev libxext-dev libwayland-dev \
          wayland-protocols libxkbcommon-dev libgl1-mesa-dev
          
    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ inputs.build-type }} \
          -DVOSTOK_BUILD_EXAMPLES=${{ inputs.enable-examples }} \
          -DVOSTOK_ENABLE_CLANG_TIDY=${{ inputs.enable-clang-tidy }} \
          -DVOSTOK_BUILD_TESTS=ON \
          -DVOSTOK_ENABLE_VALIDATION=ON \
          -DVOSTOK_TREAT_WARNINGS_AS_ERRORS=ON \
          -G Ninja
      env:
        CC: clang
        CXX: clang++